name: Web Check

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/web-check.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/web-check.yml"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - run: npm ci
        working-directory: web
      - run: npm run test
        working-directory: web
