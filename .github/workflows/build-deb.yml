name: Build DEB Packages

on:
  push:
    tags: ["v*"]
    paths-ignore:
      - "web/**"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "web/**"
  workflow_dispatch:
    inputs:
      include_2204:
        description: "Include Ubuntu 22.04 build"
        type: boolean
        default: false

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.include_2204 }}" == "true" ]]; then
            echo 'matrix={"unbtver":["24.04","22.04"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"unbtver":["24.04"]}' >> $GITHUB_OUTPUT
          fi

  build-deb:
    needs: set-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.set-matrix.outputs.matrix) }}

    runs-on: ubuntu-${{ matrix.unbtver }}
    env:
      cache_name: deb-build-${{ matrix.unbtver }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: update apt (act hack)
        if: ${{ env.ACT }}
        run: |
          apt-get update

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.unbtver }}

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: devscripts equivs
          version: 1.1
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false
          check-latest: true
      # https://github.com/actions/setup-go/issues/358
      - name: Get Go environment
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV
      - name: Set up go cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: ${{ env.cache_name }}-${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/go.mod') }}-${{ matrix.unbtver }}
          restore-keys: |
            ${{ env.cache_name }}-${{ runner.os }}-go-${{ matrix.unbtver }}
      - name: Install Go Protobuf Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Build packages
        run: |
          sudo -E env "PATH=$PATH" ./scripts/build-deb.sh
          sudo chown -R $(id -u) ~/.cargo  # fix caching for Rust

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.unbtver }}
          path: outdeb/*

  release:
    needs: build-deb
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p outdeb
          find artifacts -type f -name "*.deb" -exec cp {} outdeb/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: outdeb/*
