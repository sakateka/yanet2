[package]
name = "yanet-cli-fwstate"
version = "0.1.0"
edition = "2024"
publish = false

rust-version = "1.85"

[dependencies]
ync = { path = "../../../cli/core", version = "0.1", package = "yanet-cli" }
clap = { version = "4", features = ["derive", "cargo"] }
clap_complete = "4"
humantime = "2"
log = "0.4"
ptree = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt"] }
tonic = "0.12"
prost = "0.13"

[build-dependencies]
tonic-build = "0.12"
