syntax = "proto3";

package routepb;

option go_package = "github.com/yanet-platform/yanet2/modules/route/controlplane/routepb;routepb";

import "common/commonpb/iprange.proto";
import "common/commonpb/macaddr.proto";

service RouteService {
  // ListConfigs returns all route module configurations known to the
  // module.
  rpc ListConfigs(ListConfigsRequest) returns (ListConfigsResponse);

  // DeleteConfig deletes a route configuration.
  rpc DeleteConfig(DeleteConfigRequest) returns (DeleteConfigResponse);

  // ShowFIB returns the current Forwarding Information Base entries
  // by reading them straight from shared memory.
  rpc ShowFIB(ShowFIBRequest) returns (ShowFIBResponse);

  // UpdateFIB pushes a freshly-built FIB to the route module and
  // applies it atomically.
  rpc UpdateFIB(UpdateFIBRequest) returns (UpdateFIBResponse);
}

// ListConfigsRequest is the request to list configurations.
message ListConfigsRequest {}

// ListConfigsResponse contains existing configurations.
message ListConfigsResponse { repeated string configs = 1; }

// DeleteConfigRequest is the request to delete a route configuration.
message DeleteConfigRequest { string name = 1; }

// DeleteConfigResponse is the response of "DeleteConfig" request.
message DeleteConfigResponse {}

// ShowFIBRequest contains filters for FIB listing.
message ShowFIBRequest {
  // Route module config name.
  string name = 1;
  // Filter to show only IPv4 FIB entries.
  bool ipv4_only = 2;
  // Filter to show only IPv6 FIB entries.
  bool ipv6_only = 3;
}

// ShowFIBResponse contains the list of FIB entries.
message ShowFIBResponse {
  // List of FIB rows; each carries one range with its nexthops.
  repeated FIBRangeEntry entries = 1;
}

// FIBEntry represents a single prefix in the FIB with its nexthops.
message FIBEntry {
  // Network prefix in CIDR notation (e.g. "10.0.0.0/24").
  string prefix = 1;
  // Nexthops associated with this prefix (ECMP).
  repeated FIBNexthop nexthops = 2;
}

// FIBNexthop represents a hardware-level nexthop in the FIB.
//
// Destination MAC (binary EUI-48 carried in commonpb.MACAddress).
message FIBNexthop {
  commonpb.MACAddress dst_mac = 1;
  commonpb.MACAddress src_mac = 2;
  // Egress device name.
  string device = 3;
}

// FIBRangeEntry represents a single dataplane FIB row.
//
// Carries the contiguous address range covered by one set of nexthops.
// Used in ShowFIBResponse. UpdateFIBRequest still uses FIBEntry with a
// CIDR string until a typed commonpb.IPPrefix lands.
message FIBRangeEntry {
  commonpb.IPRange range = 1;
  repeated FIBNexthop nexthops = 2;
}

// UpdateFIBRequest carries the full FIB to be applied atomically.
message UpdateFIBRequest {
  // ModuleName is the route module config name.
  string module_name = 1;
  // Entries are the full FIB to be applied atomically.
  repeated FIBEntry entries = 3;
}

// UpdateFIBResponse is the empty ack for UpdateFIB.
message UpdateFIBResponse {}
