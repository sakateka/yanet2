syntax = "proto3";

package routepb;

option go_package = "github.com/yanet-platform/yanet2/modules/route/controlplane/routepb;routepb";

// MACAddress represents a hardware address in EUI-48 format.
message MACAddress {
  reserved 1;
  // Addr keeps MAC address bytes as a 64-bit unsigned integer in network
  // byte order.
  //
  // Stored as the lower 48 bits of a uint64. The upper 16 bits MUST be zero.
  //
  // For example, for the given MAC address "3a:ac:26:9b:5b:f9":
  //  - As array: [0x00, 0x00, 0x3a, 0xac, 0x26, 0x9b, 0x5b, 0xf9].
  //  - As uint64: 0x00003aac269b5bf9.
  uint64 addr = 2;
}
