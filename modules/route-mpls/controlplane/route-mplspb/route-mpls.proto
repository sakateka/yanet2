syntax = "proto3";

package routemplspb;

import "common/filterpb/filter.proto";

option go_package = "github.com/yanet-platform/yanet2/modules/"
		    "route-mpls/controlplane/routemplspb;routemplspb";

service RouteMPLSService {
	// Create mpls route module
	rpc CreateConfig(CreateConfigRequest) returns (CreateConfigResponse);
	// Update mpls route module
	rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
	// Allows to delete config if it is not referenced
	// by any pipeline.
	rpc DeleteConfig(DeleteConfigRequest) returns (DeleteConfigResponse);
	// Show specific ACL configuration
	rpc ShowConfig(ShowConfigRequest) returns (ShowConfigResponse);
	// List all ACL configurations across instances
	rpc ListConfigs(ListConfigsRequest) returns (ListConfigsResponse);
}

message CreateConfigRequest {
	string name = 1;
	repeated Rule rules = 2;
}

message CreateConfigResponse {
}

message UpdateConfigRequest {
	string name = 1;
	repeated UpdateEvent updates = 2;
}

message UpdateEvent {
	oneof event {
		Rule update = 1;
		Rule withdraw = 2;
	}
}

message UpdateConfigResponse {
}

message ShowConfigRequest {
	string name = 1;
}

message ShowConfigResponse {
	string name = 1;
	repeated Rule rules = 2;
}

message Rule {
	filterpb.IPPrefix prefix = 1;
	NextHop nexthop = 2;
}

message NextHop {
	ActionKind kind = 1;
	uint32 label = 2;
	bytes source_ip = 3;
	bytes destination_ip = 4;
	uint32 local_pref = 5;
	repeated uint32 as_path = 6;
	uint32 med = 7;
	uint64 weight = 8;
	string counter = 9;
}

enum ActionKind {
	ACTION_KIND_NONE = 0;
	ACTION_KIND_TUNNEL = 1;
}

// Delete config with specified name.
message DeleteConfigRequest {
	// Specifies module name and
	// dataplane instance of acl agent to delete.
	string name = 1;
}

message DeleteConfigResponse {
	bool deleted = 1;
}

message ListConfigsRequest {
}

message ListConfigsResponse {
	repeated string configs = 1;
}
