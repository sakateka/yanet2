syntax = "proto3";

package balancerpb;

import "modules/balancer/agent/balancerpb/module.proto";

option go_package = "github.com/yanet-platform/yanet2/modules/balancer/agent/balancerpb;balancerpb";

// Memory usage for real servers within a VS
message RealsUsage {
  uint64 counters_usage = 1;
  uint64 data_usage = 2;
  uint64 total_usage = 3;
}

// Memory usage for a single virtual service
message VsInspect {
  uint64 acl_usage = 1;
  uint64 ring_usage = 2;
  uint64 counters_usage = 3;
  RealsUsage reals_usage = 4;
  uint64 other_usage = 5;
  uint64 total_usage = 6;
}

// Named VS inspect with identifier
message NamedVsInspect {
  VsIdentifier identifier = 1;
  VsInspect inspect = 2;
}

// Memory usage for IPv4 or IPv6 packet handler VS section
message PacketHandlerVsInspect {
  uint64 matcher_usage = 1;
  uint64 summary_vs_usage = 2;
  repeated NamedVsInspect vs_inspects = 3;
  uint64 announce_usage = 4;
  uint64 index_usage = 5;
  uint64 total_usage = 6;
}

// Complete packet handler memory usage
message PacketHandlerInspect {
  PacketHandlerVsInspect vs_ipv4_inspect = 1;
  PacketHandlerVsInspect vs_ipv6_inspect = 2;
  uint64 summary_vs_usage = 3;
  uint64 vs_index_usage = 4;
  uint64 reals_index_usage = 5;
  uint64 counters_usage = 6;
  uint64 decap_usage = 7;
  uint64 total_usage = 8;
}

// State memory usage
message StateInspect {
  uint64 session_table_usage = 1;
  uint64 total_usage = 2;
}

// Per-balancer memory inspection
message BalancerInspect {
  // Balancer name
  string name = 1;
  // Packet handler memory usage
  PacketHandlerInspect packet_handler_inspect = 2;
  // State memory usage
  StateInspect state_inspect = 3;
  // Other memory usage
  uint64 other_usage = 4;
  // Total memory usage for this balancer
  uint64 total_usage = 5;
}

// Agent-level inspection (top-level response)
message AgentInspect {
  // Agent memory limit (configured maximum)
  uint64 memory_limit = 1;
  // Current memory usage
  uint64 memory_usage = 2;
  // List of all balancer inspects
  repeated BalancerInspect balancers = 3;
}