syntax = "proto3";

package commonpb;

option go_package = "github.com/yanet-platform/yanet2/common/commonpb;commonpb";

message Metric {
  string name = 1;
  repeated Label labels = 2;
  oneof value {
    uint64 counter = 3;
    double gauge = 4;
    Histogram histogram = 5;
  }
}

message Label {
  string name = 1;
  string value = 2;
}

message Histogram {
  repeated Bucket buckets = 1;
  uint64 total_count = 2;
}

message Bucket {
  uint64 count = 1;
  double upper_bound = 2;
}