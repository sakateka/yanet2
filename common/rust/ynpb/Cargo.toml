[package]
name = "yanet-ynpb"
version = "0.1.0"
edition = "2024"
publish = false
rust-version = "1.85"

[dependencies]
prost = "0.13"
serde = { version = "1", features = ["derive"] }
tonic = { version = "0.13", features = ["gzip"] }
commonpb = { path = "../commonpb", version = "0.1", package = "yanet-commonpb" }

[build-dependencies]
tonic-build = "0.13"
