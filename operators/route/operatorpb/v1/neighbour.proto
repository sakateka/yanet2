syntax = "proto3";

package operators.route.operatorpb.v1;

option go_package = "github.com/yanet-platform/yanet2/operators/route/operatorpb/v1;operatorpb";

import "common/commonpb/ipaddr.proto";
import "common/commonpb/macaddr.proto";

// NeighbourService is the operator-owned neighbour table surface.
service NeighbourService {
  // List returns neighbors either merged view or from a specific table.
  rpc List(ListNeighboursRequest) returns (ListNeighboursResponse);

  // CreateTable creates a new user-defined neighbour table.
  rpc CreateTable(CreateNeighbourTableRequest) returns (CreateNeighbourTableResponse);
  // UpdateTable changes the default priority of an existing neighbour
  // table.
  rpc UpdateTable(UpdateNeighbourTableRequest) returns (UpdateNeighbourTableResponse);
  // RemoveTable removes a user-defined neighbour table.
  rpc RemoveTable(RemoveNeighbourTableRequest) returns (RemoveNeighbourTableResponse);
  // ListTables returns metadata about all registered neighbour tables.
  rpc ListTables(ListNeighbourTablesRequest) returns (ListNeighbourTablesResponse);

  // UpdateNeighbours inserts or updates one or more neighbour entries.
  rpc UpdateNeighbours(UpdateNeighboursRequest) returns (UpdateNeighboursResponse);
  // RemoveNeighbours deletes one or more neighbour entries.
  rpc RemoveNeighbours(RemoveNeighboursRequest) returns (RemoveNeighboursResponse);
}

// ListNeighboursRequest is the request to list neighbors.
message ListNeighboursRequest {
  // Table is the name of the table to list entries from.
  //
  // If empty, returns the merged view.
  string table = 1;
}

// ListNeighboursResponse contains the list of neighbors.
message ListNeighboursResponse { repeated NeighbourEntry neighbours = 1; }

// NeighbourState represents the state of a neighbor entry.
enum NeighbourState {
  NUD_NONE = 0x00;
  NUD_INCOMPLETE = 0x01;
  NUD_REACHABLE = 0x02;
  NUD_STALE = 0x04;
  NUD_DELAY = 0x08;
  NUD_PROBE = 0x10;
  NUD_FAILED = 0x20;
  NUD_NOARP = 0x40;
  NUD_PERMANENT = 0x80;
  NUD_UNKNOWN = 0xff;
}

// NeighbourEntry represents a single neighbor entry.
message NeighbourEntry {
  commonpb.IPAddress next_hop = 1;
  commonpb.MACAddress link_addr = 2;
  commonpb.MACAddress hardware_addr = 3;
  NeighbourState state = 4;
  int64 updated_at = 5;
  string source = 6;
  uint32 priority = 7;
  string device = 8;
}

// CreateNeighbourTableRequest is the request to create a new neighbour
// table.
message CreateNeighbourTableRequest {
  string name = 1;
  uint32 default_priority = 2;
}

message CreateNeighbourTableResponse {}

message UpdateNeighbourTableRequest {
  string name = 1;
  uint32 default_priority = 2;
}

message UpdateNeighbourTableResponse {}

message RemoveNeighbourTableRequest { string name = 1; }

message RemoveNeighbourTableResponse {}

message ListNeighbourTablesRequest {}

message ListNeighbourTablesResponse { repeated NeighbourTableInfo tables = 1; }

message NeighbourTableInfo {
  string name = 1;
  uint32 default_priority = 2;
  int64 entry_count = 3;
  bool built_in = 4;
}

message UpdateNeighboursRequest {
  string table = 1;
  repeated NeighbourEntry entries = 2;
}

message UpdateNeighboursResponse {}

message RemoveNeighboursRequest {
  string table = 1;
  repeated commonpb.IPAddress next_hops = 2;
}

message RemoveNeighboursResponse {}
